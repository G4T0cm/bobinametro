<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué miembro de Bobina eres?</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep:   #0d0010;
    --purple-dark:   #1a0030;
    --purple-mid:    #2d0060;
    --purple-main:   #6a00c8;
    --purple-bright: #a855f7;
    --purple-neon:   #d100ff;
    --pink-glow:     #ff00cc;
    --cyan-accent:   #00e5ff;
    --text-primary:  #f0e6ff;
    --text-muted:    #9d7fc7;
    --card-bg:       rgba(42, 0, 80, 0.55);
    --border-glow:   rgba(168, 85, 247, 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--purple-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(106,0,200,.45) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(209,0,255,.3) 0%, transparent 55%),
      radial-gradient(ellipse 50% 70% at 50% 50%, rgba(0,229,255,.1) 0%, transparent 70%),
      linear-gradient(160deg, #0d0010 0%, #1a0030 40%, #0a001a 100%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { opacity: .8; }
    100% { opacity: 1; filter: hue-rotate(20deg); }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .wrapper {
    position: relative; z-index: 2;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown .8s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .header .eyebrow {
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--purple-neon);
    margin-bottom: 12px;
    text-shadow: 0 0 20px var(--purple-neon);
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 900;
    line-height: 1.15;
    background: linear-gradient(135deg, #fff 0%, var(--purple-bright) 50%, var(--pink-glow) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(168,85,247,.5));
  }
  .header .subtitle {
    margin-top: 14px;
    font-size: .95rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeDown .8s .2s ease both;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,.07);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--purple-main), var(--purple-neon), var(--pink-glow));
    transition: width .5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px var(--purple-neon);
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-glow);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(168,85,247,.1),
      0 8px 40px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.08);
    animation: cardIn .6s .1s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .question-number {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--purple-bright);
    margin-bottom: 12px;
  }
  .question-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* Normal: grid 2x2 */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  /* Desempate: solo 2 opciones centradas en columna única */
  .answers.tiebreak {
    grid-template-columns: 1fr;
    max-width: 380px;
    margin: 0 auto;
  }
  @media (max-width: 480px) {
    .answers { grid-template-columns: 1fr; }
    .card { padding: 24px 18px; }
  }

  .answer-btn {
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(168,85,247,.25);
    border-radius: 14px;
    color: var(--text-primary);
    font-family: 'Nunito', sans-serif;
    font-size: .92rem;
    font-weight: 600;
    padding: 18px 16px;
    cursor: pointer;
    text-align: left;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    line-height: 1.4;
    min-height: 64px;
  }
  .answers.tiebreak .answer-btn {
    font-size: 1rem;
    padding: 20px 24px;
    min-height: 72px;
  }
  .answer-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--purple-main), var(--pink-glow));
    opacity: 0;
    transition: opacity .25s;
    border-radius: inherit;
  }
  .answer-btn span { position: relative; z-index: 1; }
  .answer-btn:hover {
    border-color: var(--purple-bright);
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(168,85,247,.4), inset 0 0 20px rgba(168,85,247,.1);
  }
  .answer-btn:hover::before { opacity: .22; }
  .answer-btn:active { transform: scale(.97) translateY(0); }

  /* Badge de desempate */
  .tiebreak-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(209,0,255,.2), rgba(255,0,204,.15));
    border: 1px solid rgba(209,0,255,.5);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: .72rem;
    font-weight: 800;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--purple-neon);
    margin-bottom: 16px;
    box-shadow: 0 0 12px rgba(209,0,255,.25);
  }

  /* ── RESULT ── */
  .result-wrap {
    text-align: center;
    animation: resultIn .8s ease both;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: scale(.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .result-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px var(--purple-neon));
    animation: emojiPop .6s .3s cubic-bezier(.3,1.5,.5,1) both;
  }
  @keyframes emojiPop {
    from { transform: scale(0) rotate(-20deg); }
    to   { transform: scale(1) rotate(0deg); }
  }
  .result-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, var(--purple-bright) 45%, var(--pink-glow) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 25px rgba(168,85,247,.6));
    margin-bottom: 16px;
  }
  .result-desc {
    font-size: 1.05rem;
    color: var(--text-muted);
    font-weight: 400;
    max-width: 420px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }
  .result-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .score-pill {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(168,85,247,.2);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: .05em;
  }
  .score-pill.top {
    background: linear-gradient(135deg, rgba(106,0,200,.4), rgba(209,0,255,.3));
    border-color: var(--purple-neon);
    color: #fff;
    box-shadow: 0 0 10px rgba(209,0,255,.4);
  }
  .restart-btn {
    background: linear-gradient(135deg, var(--purple-main), var(--purple-neon));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    padding: 14px 40px;
    cursor: pointer;
    letter-spacing: .05em;
    text-transform: uppercase;
    box-shadow: 0 4px 30px rgba(209,0,255,.45);
    transition: all .25s;
  }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(209,0,255,.6); }
  .restart-btn:active { transform: scale(.97); }

  .glow-orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
  .orb-1 { width:400px;height:400px;background:radial-gradient(circle,rgba(106,0,200,.5),transparent 70%);top:-100px;left:-100px;animation:orbFloat 12s ease-in-out infinite; }
  .orb-2 { width:300px;height:300px;background:radial-gradient(circle,rgba(209,0,255,.35),transparent 70%);bottom:50px;right:-80px;animation:orbFloat 9s ease-in-out infinite reverse; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-40px)} }

  .bg-figure {
    position: fixed;
    bottom: -40px;
    width: 460px;
    height: auto;
    z-index: 0;
    pointer-events: none;
    opacity: 0.28;
    filter: blur(1.5px) saturate(0.8);
    mask-image: radial-gradient(ellipse 80% 85% at 50% 55%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 85% at 50% 55%, black 30%, transparent 80%);
    mix-blend-mode: screen;
  }
  .bg-figure.right {
    right: -30px;
    animation: figureFloatR 14s ease-in-out infinite;
  }
  .bg-figure.left {
    left: -30px;
    transform: scaleX(-1);
    animation: figureFloatL 16s ease-in-out infinite;
  }
  @keyframes figureFloatR {
    0%,100% { transform: translateY(0px) scale(1); opacity: 0.28; }
    50%      { transform: translateY(-20px) scale(1.04); opacity: 0.34; }
  }
  @keyframes figureFloatL {
    0%,100% { transform: scaleX(-1) translateY(0px) scale(1); opacity: 0.22; }
    50%      { transform: scaleX(-1) translateY(-14px) scale(1.03); opacity: 0.28; }
  }
</style>
</head>

// ── Datos de resultado ───────────────────────────────────────────────────────
const ALL_TYPES = ['gato','wiky','warxos','lykos','warlock','rana','merk','hectory'];

const resultData = {
  gato:    { emoji:"🐱", name:"Gato",    desc:"G4 Peceras, julen mandarina, el G4s." },
  wiky:    { emoji:"🎮", name:"Wiky",    desc:"El pezzzz pijaaaaaaa." },

};

// ── Generar opciones balanceadas (solo para las 14 preguntas normales) ───────
function buildQuizOptions() {
  const N    = questions.length; // 14
  const OPTS = 4;
  const total = N * OPTS; // 56

  const base  = Math.floor(total / ALL_TYPES.length); // 7
  const extra = total % ALL_TYPES.length;              // 0

  const shuffled = [...ALL_TYPES].sort(() => Math.random() - .5);
  const quota = {};
  shuffled.forEach((t, i) => { quota[t] = base + (i < extra ? 1 : 0); });

  const result = [];
  for (let qi = 0; qi < N; qi++) {
    const available = ALL_TYPES.filter(t => questions[qi].a.some(a => a.type === t));
    const withQuota = available
      .filter(t => quota[t] > 0)
      .sort((a, b) => (quota[b] - quota[a]) + (Math.random() - .5) * 1.5);

    let chosen = withQuota.slice(0, OPTS);
    if (chosen.length < OPTS) {
      const rest = available.filter(t => !chosen.includes(t)).sort(() => Math.random() - .5);
      chosen = chosen.concat(rest.slice(0, OPTS - chosen.length));
    }
    chosen.sort(() => Math.random() - .5);
    chosen.forEach(t => { if (quota[t] > 0) quota[t]--; });
    result.push(chosen.map(t => questions[qi].a.find(a => a.type === t)));
  }
  return result;
}

// Obtener la pregunta de desempate entre dos tipos concretos
function getTiebreakQuestion(typeA, typeB) {
  const key = [typeA, typeB].sort().join('-');
  if (tiebreakPool[key]) return tiebreakPool[key];
  // Fallback genérico
  return {
    q: "Y llegó el momento decisivo... ¿con cuál te quedas?",
    a: [
      { text: `${resultData[typeA].emoji} Soy más ${resultData[typeA].name}`, type: typeA },
      { text: `${resultData[typeB].emoji} Soy más ${resultData[typeB].name}`, type: typeB }
    ]
  };
}

// ── Estado ───────────────────────────────────────────────────────────────────
const TOTAL_SHOWN = questions.length + 1; // 14 normales + 1 desempate = 15 para la barra
let current     = 0;
let scores      = {};
let quizOptions = [];
let isTiebreak  = false;
ALL_TYPES.forEach(t => scores[t] = 0);

// ── Particles ────────────────────────────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = ['#a855f7','#d100ff','#ff00cc','#6a00c8','#00e5ff'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;`
      + `background:${colors[Math.floor(Math.random()*colors.length)]};`
      + `box-shadow:0 0 ${size*3}px currentColor;`
      + `animation-duration:${Math.random()*15+8}s;animation-delay:${Math.random()*10}s;`;
    container.appendChild(p);
  }
})();

// ── Progress ─────────────────────────────────────────────────────────────────
function updateProgress(step) {
  const pct = Math.round((step / TOTAL_SHOWN) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Pregunta ${step} de ${TOTAL_SHOWN}`;
  document.getElementById('progressPct').textContent = pct + '%';
}

// ── Mostrar pregunta normal ───────────────────────────────────────────────────
function showQuestion() {
  isTiebreak = false;
  updateProgress(current + 1);
  const q    = questions[current];
  const opts = quizOptions[current];

  animateCard();

  let html = `<div class="question-number">Pregunta ${current + 1} / ${TOTAL_SHOWN}</div>`;
  html    += `<div class="question-text">${q.q}</div><div class="answers">`;
  opts.forEach(ans => {
    html += `<button class="answer-btn" onclick="answer('${ans.type}')"><span>${ans.text}</span></button>`;
  });
  html += `</div>`;

  document.getElementById('quiz').innerHTML   = html;
  document.getElementById('result').innerHTML = '';
}

// ── Mostrar pregunta de desempate ─────────────────────────────────────────────
function showTiebreak(typeA, typeB) {
  isTiebreak = true;
  updateProgress(TOTAL_SHOWN);
  const tb = getTiebreakQuestion(typeA, typeB);

  animateCard();

  let html = `<div class="question-number">Pregunta ${TOTAL_SHOWN} / ${TOTAL_SHOWN} — Desempate</div>`;
  html    += `<div class="tiebreak-badge">⚡ Momento decisivo</div>`;
  html    += `<div class="question-text">${tb.q}</div>`;
  html    += `<div class="answers tiebreak">`;
  tb.a.forEach(ans => {
    html += `<button class="answer-btn" onclick="answer('${ans.type}')"><span>${ans.text}</span></button>`;
  });
  html += `</div>`;

  document.getElementById('quiz').innerHTML   = html;
  document.getElementById('result').innerHTML = '';
}

// ── Respuesta ─────────────────────────────────────────────────────────────────
function answer(type) {
  scores[type]++;
  current++;

  if (current < questions.length) {
    // Pregunta normal
    showQuestion();
  } else {
    // Terminaron las preguntas normales → comprobar empate
    const sorted  = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const topScore = sorted[0][1];
    const tied    = sorted.filter(([, v]) => v === topScore).map(([k]) => k);

    if (tied.length >= 2) {
      // Hay empate → mostrar desempate entre los dos primeros
      showTiebreak(tied[0], tied[1]);
    } else {
      showResult();
    }
  }
}

// ── Resultado ─────────────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('progressWrap').style.display = 'none';
  const max    = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const r      = resultData[max];
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

  const pillsHtml = sorted.map(([k, v]) =>
    `<div class="score-pill ${k===max?'top':''}">${resultData[k].emoji} ${resultData[k].name} — ${v}</div>`
  ).join('');

  animateCard();
  document.getElementById('quiz').innerHTML = '';
  document.getElementById('result').innerHTML = `
    <div class="result-wrap">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-name">${r.name}</div>
      <p class="result-desc">${r.desc}</p>
      <div class="result-bar">${pillsHtml}</div>
      <button class="restart-btn" onclick="restart()">Volver a empezar</button>
    </div>`;
}

// ── Reiniciar ─────────────────────────────────────────────────────────────────
function restart() {
  current = 0;
  isTiebreak = false;
  ALL_TYPES.forEach(t => scores[t] = 0);
  quizOptions = buildQuizOptions();
  document.getElementById('progressWrap').style.display = 'block';
  showQuestion();
}

// ── Animación de card ─────────────────────────────────────────────────────────
function animateCard() {
  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardIn .4s ease both';
}

// ── Init ──────────────────────────────────────────────────────────────────────
quizOptions = buildQuizOptions();
showQuestion();
</script>
